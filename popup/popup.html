<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나이스 복붙 요정</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>🧚 나이스 복붙 요정</h1>
    <p class="subtitle">엑셀 → 나이스, 요정이 대신 복붙!</p>
  </header>

  <section class="card">
    <div class="row">
      <label for="menuPreset">나이스 메뉴</label>
      <select id="menuPreset" class="wide-select"></select>
    </div>
    <p class="help help-simple">
      ① 메뉴 선택 → ② 엑셀 <strong>파일</strong> 또는 <strong>복사 붙여넣기</strong> → ③ <strong>전체 입력</strong> → ④ 나이스 <strong>입력칸 클릭</strong> (스토어 설치 직후는 F5)
    </p>
  </section>

  <section class="card">
    <div class="source-tabs" role="tablist">
      <button type="button" class="source-tab active" data-source="file" role="tab">파일</button>
      <button type="button" class="source-tab" data-source="paste" role="tab">붙여넣기</button>
    </div>

    <div id="fileSource">
      <label class="file-label" for="fileInput">
        <span class="file-icon">📄</span>
        <span id="fileName">엑셀 파일 선택 (.xlsx, .xls, .csv)</span>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" hidden />
      </label>
    </div>

    <div id="pasteSource" hidden>
      <textarea
        id="pasteInput"
        class="paste-input"
        rows="4"
        placeholder="엑셀에서 셀을 선택 → Ctrl+C → 여기 클릭 → Ctrl+V"
      ></textarea>
      <button type="button" id="btnPasteLoad" class="btn paste-load">클립보드에서 불러오기</button>
    </div>

    <div class="row" id="sheetRow" hidden>
      <label for="sheetSelect">시트</label>
      <select id="sheetSelect" class="wide-select"></select>
    </div>

    <div class="row">
      <label for="startRow">시작 행</label>
      <input type="number" id="startRow" min="1" value="1" />
      <span class="hint">(1 = 첫 번째 행)</span>
    </div>

    <div class="row">
      <label for="startCol">시작 열</label>
      <input type="number" id="startCol" min="1" value="1" />
    </div>

    <div class="row">
      <label for="endCol">끝 열</label>
      <input type="number" id="endCol" min="1" placeholder="자동" />
      <span class="hint">비우면 마지막 열까지</span>
    </div>

    <div class="row">
      <label for="skipHeader">
        <input type="checkbox" id="skipHeader" />
        첫 행을 헤더로 건너뛰기
      </label>
    </div>
  </section>

  <section class="card" id="advancedSection">
    <h2>입력 설정 <span class="preset-badge" id="presetBadge"></span></h2>
    <div class="row">
      <label for="tabsBetweenCells">셀 간 Tab 횟수</label>
      <input type="number" id="tabsBetweenCells" min="0" max="20" value="1" />
    </div>
    <div class="row">
      <label for="tabsAfterRow">행 끝 Tab 횟수</label>
      <input type="number" id="tabsAfterRow" min="0" max="20" value="0" />
      <span class="hint">Tab 이동 시에만 사용</span>
    </div>
    <div class="row">
      <label for="rowEndType">다음 행 이동</label>
      <select id="rowEndType" class="wide-select">
        <option value="enter" selected>Enter (수행평가 등)</option>
        <option value="tab">Tab만 (행 끝 Tab 횟수 사용)</option>
        <option value="enter-then-tab">Enter + Tab</option>
        <option value="auto">자동 찾기</option>
      </select>
    </div>
    <div class="row">
      <label for="delayMs">입력 간격 (ms)</label>
      <input type="number" id="delayMs" min="50" max="2000" step="50" value="70" />
    </div>
  </section>

  <section class="card preview-card" id="previewSection" hidden>
    <h2>데이터 미리보기</h2>
    <div class="preview-meta" id="previewMeta"></div>
    <div class="preview-wrap">
      <table id="previewTable"></table>
    </div>
  </section>

  <section class="actions">
    <button type="button" id="btnAll" class="btn primary" disabled>전체 입력</button>
    <button type="button" id="btnOne" class="btn secondary" disabled>한 행 입력</button>
    <button type="button" id="btnStop" class="btn danger" hidden>중지</button>
  </section>

  <p class="status" id="status"></p>

  <footer>
    <span class="credit">Made by IASA HJ</span>
  </footer>

  <script src="../lib/xlsx.full.min.js"></script>
  <script src="presets.js"></script>
  <script src="popup.js"></script>
</body>
</html>
